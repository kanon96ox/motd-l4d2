<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CUYCITO WORLD</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,1) 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.container {
    position: relative;
    text-align: center;
}

.container img {
    max-width: 95%;
    max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 0 40px black;
}

.title {
    position: absolute;
    top: 5%;
    width: 100%;
    font-size: 50px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px black, 0 0 40px red;
}

.modos {
    position: absolute;
    left: 5%;
    bottom: 10%;
    color: white;
    text-align: left;
    font-size: 18px;
    text-shadow: 0 0 10px black;
}

.discord {
    position: absolute;
    right: 5%;
    bottom: 10%;
}

.discord a {
    padding: 12px 20px;
    background: linear-gradient(45deg, #5865F2, #404eed);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 18px;
    transition: 0.3s;
    box-shadow: 0 0 15px black;
}

.discord a:hover {
    transform: scale(1.1);
}

.footer {
    position: absolute;
    bottom: 3%;
    width: 100%;
    color: #ccc;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <img src="fondo.png">

    <div class="title">CUYCITO WORLD</div>

    <div class="modos">
        <b>MODOS:</b><br>
        • ZoneMod<br>
        • Vanilla Max<br>
        • Vanilla T1<br>
        • Vanilla T2
    </div>

    <div class="discord">
        <a href="https://discord.gg/7pM9CmcRbu" target="_blank">
            Unirse al Discord
        </a>
    </div>

    <div class="footer">
        Bienvenido • Respeta las reglas • Disfruta tu estancia
    </div>

</div>

</body>
</html>
